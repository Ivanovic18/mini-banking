version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH-LOCATIONS=file:///app/config-repo

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - config-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true

  account-service:
    build: ./account-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - config-server
      - user-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true

  transaction-service:
    build: ./transaction-service
    ports:
      - "8091-8092:8083"
    depends_on:
      - eureka-server
      - config-server
      - account-service
      - rabbitmq
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true

  card-service:
    build: ./card-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - config-server
      - account-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true

  notification-service:
    build: ./notification-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - config-server
      - rabbitmq
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - config-server
      - user-service
      - account-service
      - transaction-service
      - card-service
      - notification-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
